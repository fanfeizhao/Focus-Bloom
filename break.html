<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time to rest</title>
  <link rel="stylesheet" href="break.css">
</head>
<body>
  <div class="orb orb-one"></div>
  <div class="orb orb-two"></div>
  <div class="orb orb-three"></div>

  <main>
    <div class="flower" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
      <div class="flower-center"></div>
    </div>

    <p class="eyebrow">FOCUS BLOOM</p>
    <h1>Give your eyes<br><em>a real break.</em></h1>
    <p class="instruction">Look across the room, relax your shoulders, and take a few slow breaths.</p>

    <div class="countdown-shell">
      <div id="breakCountdown" class="break-countdown">05:00</div>
      <div class="label">remaining</div>
    </div>

    <div class="breath">
      <div class="breath-dot"></div>
      <span id="breathText">Breathe in</span>
    </div>

    <p class="footnote">This screen will close automatically when your break is complete.</p>
  </main>

  <script src="break.js"></script>
</body>
</html>
